<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Bet Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #0d1117;
        }
        .brand-color { color: #00e676; }
        .auth-wrapper { max-width: 420px; width: 100%; padding: 1rem; }
    </style>
</head>
<body>

<div class="auth-wrapper">
    <div class="text-center mb-4">
        <h2 class="brand-color fw-bold">
            <i class="bi bi-graph-up-arrow"></i> Bet Manager
        </h2>
        <p class="text-secondary">Faça login para acessar sua conta</p>
    </div>

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %}">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <div class="card border-0 shadow p-4">
        <form method="post" novalidate>
            {% csrf_token %}
            {% if form.errors %}
            <div class="alert alert-danger py-2 mb-3">
                <i class="bi bi-exclamation-circle me-1"></i>
                Usuário ou senha incorretos. Tente novamente.
            </div>
            {% endif %}

            <div class="mb-3">
                <label for="id_username" class="form-label fw-semibold">Usuário</label>
                <input
                    type="text"
                    name="username"
                    id="id_username"
                    class="form-control"
                    placeholder="Seu nome de usuário"
                    autocomplete="username"
                    autofocus
                    required
                >
            </div>

            <div class="mb-4">
                <label for="id_password" class="form-label fw-semibold">Senha</label>
                <input
                    type="password"
                    name="password"
                    id="id_password"
                    class="form-control"
                    placeholder="Sua senha"
                    autocomplete="current-password"
                    required
                >
            </div>

            <button type="submit" class="btn btn-success w-100 fw-bold py-2">
                <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
            </button>
        </form>
    </div>

    <p class="text-center text-secondary mt-3 mb-0">
        Não tem uma conta?
        <a href="{% url 'register' %}" class="text-success text-decoration-none fw-semibold">Criar conta</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
